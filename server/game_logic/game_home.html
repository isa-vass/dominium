<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Interattiva di Albia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1f2e;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-wrapper svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .province-fill {
            cursor: pointer;
            transition: filter 0.2s, fill-opacity 0.2s;
            fill-opacity: 0.82;
        }

        .province-fill:hover {
            fill-opacity: 1;
            filter: brightness(1.25) drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }

        #tooltip {
            position: fixed;
            background: rgba(10, 14, 26, 0.95);
            color: #e8e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            pointer-events: none;
            font-family: 'Georgia', serif;
            font-size: 13px;
            line-height: 1.7;
            max-width: 220px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        #tooltip .t-name {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 5px;
        }

        #tooltip .t-state {
            color: #aab0c8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        #tooltip .t-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        #tooltip .t-label {
            color: #7a8099;
        }

        #tooltip .t-val {
            color: #d4d8e8;
            font-weight: 600;
        }
    </style>
</head>

    <script>
        const ownerName = '';
        const ownerTroups = 0;

        const provinces = {
            'province-1': { name: 'Haygram', continent: 'Kingdom of Fimia', owner: ownerName, troups: ownerTroups},
            'province-2': { name: "Baka", continent: 'Kingdom of Fimia', owner: ownerName, troups: ownerTroups},
            'province-3': { name: 'Albuquerque', continent: 'Kingdom of Fimia', owner: ownerName, troups: ownerTroups},
            'province-4': { name: 'Magnus', continent: 'Kingdom of Fimia', owner: ownerName, troups: ownerTroups},
            'province-5': { name: "BakuDeku" , continent: 'Union of Arstotzka', owner: ownerName, troups: ownerTroups},
            'province-6': { name: 'Tankyou', continent: 'Union of Arstotzka', owner: ownerName, troups: ownerTroups},
            'province-7': { name: 'Pontedera', continent: 'Union of Arstotzka', owner: ownerName, troups: ownerTroups},
            'province-8': { name: 'Poggibonsi', continent: 'Union of Arstotzka', owner: ownerName, troups: ownerTroups},
            'province-9': { name: 'Youranus', continent: 'Duchy of Garganta', owner: ownerName, troups: ownerTroups},
            'province-10': { name: 'Kenia', continent: 'Duchy of Garganta', owner: ownerName, troups: ownerTroups},
            'province-11': { name: 'Epstein', continent: 'Duchy of Garganta', owner: ownerName, troups: ownerTroups},
            'province-12': { name: 'Calabria', continent: 'Duchy of Garganta', owner: ownerName, troups: ownerTroups},
            'province-13': { name: 'Susshy', continent: 'Divine Empire of Agartha', owner: ownerName, troups: ownerTroups},
            'province-14': { name: 'Lezzoh', continent: 'Divine Empire of Agartha', owner: ownerName, troups: ownerTroups},
            'province-15': { name: 'Sodapop', continent: 'Divine Empire of Agartha', owner: ownerName, troups: ownerTroups},
            'province-16': { name: 'Shapeofyou', continent: 'Divine Empire of Agartha', owner: ownerName, troups: ownerTroups}
        };

       const continentColors = {
            'Divine Empire of Agartha': '#a7c957',
            'Duchy of Garganta': '#cbeef3',
            'Kingdom of Fimia': '#ef233c',
            'Union of Arstotzka': '#ffb3c6'
        };

        const tooltip = document.getElementById('tooltip');

        Object.keys(provinces).forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;

            el.addEventListener('mouseenter', e => {
                const d = provinces[id];
                const col = continentColors[d.continent] || '#fff';
                tooltip.innerHTML = `
                <div class="t-name">${d.name}</div>
                <div class="t-state" style="color:${col}">${d.continent}</div>
                <div class="t-row"><span class="t-label">Owner</span><span class="t-val">${d.owner.toLocaleString('it-IT')}</span></div>
                <div class="t-row"><span class="t-label">Troups</span><span class="t-val">${d.troups}</span></div>
            `;
                tooltip.style.display = 'block';
            });

            el.addEventListener('mousemove', e => {
                tooltip.style.left = (e.clientX + 18) + 'px';
                tooltip.style.top = (e.clientY + 18) + 'px';
                // keep tooltip on screen
                const r = tooltip.getBoundingClientRect();
                if (r.right > window.innerWidth) tooltip.style.left = (e.clientX - r.width - 10) + 'px';
                if (r.bottom > window.innerHeight) tooltip.style.top = (e.clientY - r.height - 10) + 'px';
            });

            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    </script>
